name: Release

on:
  push:
    tags:
      - 'v*'
      - 'alpha*'
      - 'Alpha*'
      - 'beta*'
      - 'Beta*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build & release (e.g. v1.10.1 / v1.10.1-alpha.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # workflow_dispatch lets us build/release a tag that may not yet exist
          # on the runner — checkout the input ref when it does, else HEAD.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Identify channel
        id: id
        run: |
          set -e
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "ref=${REF}"          >> "$GITHUB_OUTPUT"
          lower=$(printf '%s' "$REF" | tr '[:upper:]' '[:lower:]')
          if   [[ "$lower" == *alpha* ]]; then channel=alpha;  pre=true
          elif [[ "$lower" == *beta*  ]]; then channel=beta;   pre=true
          elif [[ "$lower" == *rc*    ]]; then channel=rc;     pre=true
          else                                  channel=stable; pre=false
          fi
          echo "channel=${channel}"  >> "$GITHUB_OUTPUT"
          echo "prerelease=${pre}"   >> "$GITHUB_OUTPUT"
          echo "::notice::Building ${REF} (channel=${channel}, prerelease=${pre})"

      - name: Build linux/darwin/windows × amd64/arm64
        run: |
          set -e
          make all VERSION="${{ steps.id.outputs.ref }}"
          # Windows binaries need the .exe suffix.
          for f in bin/mihomo-windows-*; do
            [ -f "$f" ] && case "$f" in *.exe) : ;; *) mv "$f" "$f.exe" ;; esac
          done
          echo "--- bin/ ---"
          ls -la bin/mihomo-*
          # sanity: print embedded version of one binary
          (./bin/mihomo-linux-amd64 -v 2>&1 || true) | head -1

      - name: Generate checksums
        run: |
          cd bin
          sha256sum mihomo-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.id.outputs.ref }}
          name:                   ${{ steps.id.outputs.ref }}
          prerelease:             ${{ steps.id.outputs.prerelease }}
          generate_release_notes: true
          files: |
            bin/mihomo-linux-amd64
            bin/mihomo-linux-arm64
            bin/mihomo-darwin-amd64
            bin/mihomo-darwin-arm64
            bin/mihomo-windows-amd64.exe
            bin/mihomo-windows-arm64.exe
            bin/SHA256SUMS.txt
